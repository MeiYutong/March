<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>春启新章 · 花笺书签 · 雅致适屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2e3d4;
            background-image: radial-gradient(circle at 10% 20%, #f8d9b0 1px, transparent 1px),
                              radial-gradient(circle at 90% 70%, #eaccb0 2px, transparent 2px),
                              linear-gradient(145deg, #ecdac5, #f7e8d8);
            background-size: 40px 40px, 80px 80px, 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;           /* 四周内边距微调，更紧凑 */
            font-family: 'KaiTi', '楷体', 'STKaiti', '华文楷体', serif;
            position: relative;
            overflow-x: hidden;
        }

        /* === 浮动花瓣（动态飘落）=== */
        .floating-petal {
            position: fixed;
            pointer-events: none;
            z-index: 5;
            font-size: 1.2rem;
            opacity: 0.5;
            animation: floatPetal 15s linear infinite;
            color: #d69d7c;
        }

        @keyframes floatPetal {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.2; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.6; }
        }

        .petal1 { left: 5%; animation-duration: 14s; animation-delay: 0s; }
        .petal2 { left: 15%; animation-duration: 19s; animation-delay: 3s; }
        .petal3 { left: 30%; animation-duration: 17s; animation-delay: 1s; }
        .petal4 { left: 50%; animation-duration: 22s; animation-delay: 6s; }
        .petal5 { left: 70%; animation-duration: 16s; animation-delay: 2s; }
        .petal6 { left: 85%; animation-duration: 21s; animation-delay: 4s; }
        .petal7 { left: 95%; animation-duration: 18s; animation-delay: 7s; }

        /* === 主卡 — 花纹完全保留，仅优化手机长度（减小垂直padding，缩小部分元素）=== */
        .main-card {
            max-width: 380px;         /* 宽度略收，更适应手机 */
            width: 100%;
            background: #fdf5e9;
            /* 保留所有花纹：波浪点、四叶草、菱形网格 — 完全不变 */
            background-image: 
                radial-gradient(circle at 20% 30%, #ebcfb3 2px, transparent 2px),
                radial-gradient(circle at 90% 15%, #e2be9c 2px, transparent 3px),
                repeating-linear-gradient(45deg, rgba(220, 170, 130, 0.1) 0px, rgba(220, 170, 130, 0.1) 4px, transparent 4px, transparent 12px),
                linear-gradient(165deg, #fff3e0 0%, #f9e9d5 100%);
            background-size: 40px 40px, 60px 60px, auto, 100%;
            border-radius: 120px 120px 40px 40px;
            /* 调整内边距：顶部减少，底部减少，整体缩短 */
            padding: 28px 22px 25px;    /* 原40 28 35 → 缩小顶部和底部 */
            box-shadow: 0 25px 40px -8px #7a624b, 
                        0 0 0 2px #f0dabf inset,
                        0 0 0 6px #fff1df,
                        0 0 0 10px #dbb58b;
            position: relative;
            z-index: 20;
            border: 2px solid #f3c9a2;
        }

        /* 额外装饰：主卡左上/右下印花 (完全保留) */
        .main-card::before {
            content: "🌸 🌼 🌸";
            position: absolute;
            top: 8px;
            left: 20px;
            font-size: 1rem;
            color: #cb9d79;
            opacity: 0.6;
            letter-spacing: 6px;
            transform: rotate(-5deg);
            white-space: nowrap;
        }

        .main-card::after {
            content: "✿  ✿  ✿";
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 1.2rem;
            color: #c18f63;
            opacity: 0.5;
            transform: rotate(3deg);
        }

        /* 流苏吊坠 (书签下部) — 位置微调以匹配新padding */
        .tassel {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 35px;
            background: linear-gradient(to bottom, #b0885a, #c99e73, #b0885a);
            border-radius: 4px;
            box-shadow: 0 2px 6px #7a5a3e;
        }

        .tassel::before {
            content: "";
            position: absolute;
            bottom: -8px;
            left: -10px;
            width: 24px;
            height: 18px;
            background: radial-gradient(ellipse at center, #d4a373 0%, #b5824e 80%);
            border-radius: 50%;
            box-shadow: 0 3px 8px #6d4d31;
        }

        .tassel::after {
            content: "🌸";
            position: absolute;
            bottom: -30px;
            left: -11px;
            font-size: 1.8rem;
            filter: drop-shadow(0 4px 4px #b38b67);
            animation: swing 3s infinite ease-in-out;
            transform-origin: top center;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(8deg); }
        }

        /* 书签挂孔 & 挂绳 (保留) */
        .main-card .hole {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: #c8a27b;
            border: 3px solid #f7e0c5;
            border-radius: 50%;
            box-shadow: 0 4px 8px #4f3d2c inset, 0 2px 6px #93785c;
            z-index: 5;
        }

        .main-card .rope {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 24px;
            background: #b48d67;
            border-radius: 20px 20px 8px 8px;
            box-shadow: 0 -4px 6px #6f543d;
            z-index: 4;
        }

        .main-card .rope::before {
            content: "🪢";
            position: absolute;
            top: -18px;
            left: 5px;
            font-size: 1.5rem;
            transform: rotate(15deg);
            filter: drop-shadow(0 2px 4px #7b5b3e);
        }

        h1 {
            font-size: 2.4rem;          /* 从2.6稍减，更好适配小屏 */
            color: #7b4f32;
            text-align: center;
            font-weight: 500;
            border-bottom: 2px dashed #d9af87;
            padding-bottom: 6px;          /* 稍减 */
            margin: 18px 0 6px 0;         /* 上下外边距减小 */
            font-family: 'KaiTi', '楷体', cursive;
            letter-spacing: 6px;
            text-shadow: 3px 3px 0 #eedcc8;
            position: relative;
        }

        h1::after {
            content: "✽ ✿ ✾";
            position: absolute;
            bottom: -24px;                /* 上调，避免重叠 */
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            color: #be8b65;
            letter-spacing: 10px;
            width: 100%;
        }

        .subhead {
            text-align: center;
            color: #ac7e5c;
            font-size: 1.1rem;            /* 稍微缩小一点 */
            margin: 16px 0 16px;           /* 上下边距减小 */
            letter-spacing: 6px;
            background: rgba(243, 218, 190, 0.6);
            padding: 4px 14px;             /* 减少内边距 */
            border-radius: 60px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #e0b691;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 8px #e1ba95;
        }

        form {
            margin-top: 5px;               /* 减小上边距 */
        }

        .form-item {
            margin-bottom: 12px;            /* 原18 → 12，减少间距 */
        }

        label {
            display: block;
            color: #946f4f;
            font-size: 0.95rem;             /* 略微缩小 */
            margin-bottom: 3px;
            padding-left: 12px;
            font-weight: 600;
            text-shadow: 0 1px 2px #f5e0cc;
        }

        .required-star { 
            color: #d67a5a; 
            margin-left: 4px;
            font-size: 1.2rem;
        }

        input, textarea {
            width: 100%;
            background: #fffbf2;
            border: 2px solid #edceb2;
            border-radius: 40px;
            padding: 10px 18px;            /* 原14 20 → 减少上下填充 */
            font-size: 0.95rem;
            font-family: 'KaiTi', '楷体', serif;
            outline: none;
            transition: 0.2s;
            box-shadow: inset 0 2px 8px #f4dec6, 0 3px 0 #ccaa84;
        }

        input:focus, textarea:focus {
            border-color: #c49066;
            background: #fffff5;
            box-shadow: 0 0 0 5px #eedbc8, inset 0 2px 8px #e7c9ae;
        }

        textarea { 
            min-height: 65px;               /* 原80 → 降低高度 */
            border-radius: 30px;
        }

        button {
            background: #efd3b5;
            border: none;
            width: 100%;
            padding: 14px 10px;              /* 原18 10 → 减少 */
            font-size: 1.4rem;                /* 稍微缩小 */
            color: #4c3826;
            border-radius: 60px;
            border-bottom: 6px solid #bc8f68;
            border-right: 3px solid #dbb18b;
            font-family: 'KaiTi', '楷体', serif;
            letter-spacing: 6px;
            margin: 20px 0 10px;              /* 减少上下外边距 */
            cursor: pointer;
            box-shadow: 0 12px 16px -8px #aa805f, 0 2px 0 #fae6cf inset;
            transition: 0.08s linear;
            font-weight: bold;
        }

        button:active { 
            transform: translateY(5px); 
            border-bottom-width: 2px; 
            box-shadow: 0 5px 10px #aa805f;
        }

        .form-note { 
            text-align: center; 
            color: #b78d6e; 
            font-size: 0.85rem;               /* 稍减 */
            letter-spacing: 2px;
            border-top: 2px dotted #eacfb4;
            padding-top: 10px;                 /* 减少 */
            margin-top: 5px;                    /* 减少 */
        }

        /* ===== 心愿卡 - 完全保留所有花纹，但略微缩小边距 ===== */
        .card-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(60, 40, 25, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 16px;
            z-index: 1000;
        }

        .wish-card {
            max-width: 380px;                /* 与主卡一致，稍小 */
            width: 100%;
            background: #fff9ef;
            /* 保留所有花纹 (四叶草、碎花、网格) */
            background-image: 
                radial-gradient(circle at 15% 25%, #f3d2b2 3px, transparent 3px),
                radial-gradient(circle at 88% 70%, #eccaa7 4px, transparent 4px),
                repeating-linear-gradient(45deg, rgba(212, 162, 116, 0.1) 0px, rgba(212, 162, 116, 0.1) 6px, transparent 6px, transparent 16px),
                radial-gradient(circle at 40% 80%, #f5deca 5px, transparent 5px);
            background-size: 60px 60px, 80px 80px, auto, 100px 100px;
            border-radius: 140px 140px 50px 50px;
            padding: 30px 20px 28px;           /* 原40 25 35 → 缩小 */
            border: 10px solid #f1d3b2;        /* 原12略减为10，仍厚重 */
            box-shadow: 0 40px 50px -15px #2f2219, 0 0 0 5px #faead7 inset, 0 0 0 8px #e5be98 inset;
            position: relative;
            backdrop-filter: blur(2px);
        }

        /* 书签挂孔、挂绳、流苏 (保留，位置微调) */
        .wish-card .hole {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: #be9c7a;
            border: 4px solid #fcecd9;
            border-radius: 50%;
            box-shadow: 0 3px 8px #3e2f1f inset, 0 3px 6px #85664b;
            z-index: 10;
        }

        .wish-card .rope {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 28px;
            background: #b78c62;
            border-radius: 20px 20px 8px 8px;
            box-shadow: 0 -6px 8px #5c4230;
            z-index: 9;
        }

        .wish-card .rope::before {
            content: "🪷";
            position: absolute;
            top: -22px;
            left: 0px;
            font-size: 1.8rem;
            transform: rotate(-8deg);
            filter: drop-shadow(0 4px 4px #825e42);
        }

        .wish-card .tassel-bottom {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 40px;
            background: linear-gradient(to bottom, #b78a60, #e2b58b, #b78a60);
            border-radius: 5px;
            box-shadow: 0 5px 8px #604632;
            z-index: 8;
        }

        .wish-card .tassel-bottom::after {
            content: "🌼🌸";
            position: absolute;
            bottom: -32px;
            left: -22px;
            font-size: 2rem;
            filter: drop-shadow(0 6px 6px #936f4f);
            animation: swingTassel 3s infinite alternate;
            transform-origin: top center;
            white-space: nowrap;
            letter-spacing: -4px;
        }

        @keyframes swingTassel {
            0% { transform: rotate(-6deg); }
            100% { transform: rotate(6deg); }
        }

        /* 右上角叉号 保留缩小样式 */
        .close-btn {
            position: absolute;
            top: 6px;
            right: 10px;
            background: rgba(242, 218, 192, 0.6);
            border: none;
            font-size: 1.8rem;
            color: #946b48;
            cursor: pointer;
            width: 32px;
            height: 32px;
            line-height: 28px;
            border-radius: 50%;
            text-align: center;
            z-index: 30;
            font-weight: 300;
            box-shadow: 0 2px 8px #c9a27e;
            backdrop-filter: blur(2px);
            border: 1px solid #f1cfb2;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 4px;
        }

        .close-btn:hover { 
            background: #e6c3a3;
            transform: scale(1.1); 
            color: #6e422b;
        }

        /* 花瓣装饰 (完全保留) */
        .wish-card .petal-deco {
            position: absolute;
            top: 15px; left: 15px;
            font-size: 2.2rem;
            color: #e9ac7a;
            opacity: 0.7;
            transform: rotate(-15deg);
            z-index: 5;
            text-shadow: 2px 2px 4px #ebc09e;
        }

        .wish-card .petal-deco2 {
            bottom: 15px; right: 15px;
            position: absolute;
            font-size: 2.4rem;
            color: #eab383;
            opacity: 0.7;
            transform: rotate(25deg);
            text-shadow: 2px 2px 6px #dbaa7c;
        }

        .wish-card .deco-left {
            position: absolute;
            left: 0;
            top: 40%;
            writing-mode: vertical-rl;
            font-size: 1.2rem;
            color: #cf9d74;
            opacity: 0.5;
            letter-spacing: 8px;
        }

        .wish-card .deco-right {
            position: absolute;
            right: 0;
            top: 20%;
            writing-mode: vertical-rl;
            font-size: 1.2rem;
            color: #cf9d74;
            opacity: 0.5;
            letter-spacing: 8px;
            transform: rotate(180deg);
        }

        .card-content {
            background: #f9ecdc;
            border-radius: 50px;
            padding: 18px 16px;           /* 原24 18 → 缩小一点 */
            margin: 22px 0 16px;            /* 调整上下边距 */
            line-height: 1.7;
            border: 2px solid #e5c09d;
            box-shadow: inset 0 0 20px #edd0b2, 0 6px 12px rgba(150, 100, 70, 0.2);
            font-size: 1rem;
            color: #4d3823;
            word-break: break-word;
            z-index: 20;
            background-image: radial-gradient(circle at 10px 10px, #f7dbbd 2px, transparent 2px);
            background-size: 20px 20px;
        }

        .card-foot {
            display: flex;
            justify-content: space-between;
            color: #ab7b58;
            border-top: 2px solid #eacdae;
            padding-top: 12px;              /* 减少 */
            font-size: 0.95rem;
            letter-spacing: 2px;
            z-index: 20;
        }

        .save-card-btn { display: none; }
    </style>
</head>
<body>
    <!-- 浮动花瓣 (完全保留) -->
    <div class="floating-petal petal1">🌸</div>
    <div class="floating-petal petal2">🌼</div>
    <div class="floating-petal petal3">🌺</div>
    <div class="floating-petal petal4">🌸</div>
    <div class="floating-petal petal5">🌷</div>
    <div class="floating-petal petal6">🌿</div>
    <div class="floating-petal petal7">🍃</div>

    <!-- 主表单卡片 (花纹不变，仅高度优化) -->
    <div class="main-card">
        <div class="hole"></div>
        <div class="rope"></div>
        <div class="tassel"></div>

        <h1>春启新章</h1>
        <div class="subhead">· 成长约定 · 丙午 ·</div>

        <form id="wishForm">
            <div class="form-item">
                <label>姓名 <span class="required-star">✱</span></label>
                <input type="text" id="name" placeholder="如：子瞻" required>
            </div>
            <div class="form-item">
                <label>计划名称 <span class="required-star">✱</span></label>
                <input type="text" id="planName" placeholder="如：春日读书会" required>
            </div>
            <div class="form-item">
                <label>计划梗概 <span class="required-star">✱</span></label>
                <textarea id="planSummary" placeholder="寥寥数语，勾勒新章..." required></textarea>
            </div>
            <div class="form-item">
                <label>预计完成时间 <span class="required-star">✱</span></label>
                <input type="datetime-local" id="deadline" required>
            </div>
            <button type="button" id="submitBtn">钤印 · 生成书签</button>
        </form>
        <div class="form-note">✿ 丙午年 · 春信至 · 花间一诺 ✿</div>
    </div>

    <!-- 心愿卡浮层 (花纹完全保留，叉号缩小右上) -->
    <div id="cardOverlay" class="card-overlay">
        <div class="wish-card" id="wishCard">
            <div class="hole"></div>
            <div class="rope"></div>
            <div class="tassel-bottom"></div>
            <div class="petal-deco">🌼🌸</div>
            <div class="petal-deco2">🌺🌿</div>
            <div class="deco-left">✽ ✿ ✾</div>
            <div class="deco-right">🌸 🌼 🌸</div>
            <button class="close-btn" id="closeCardBtn">✕</button>
            <div class="card-content" id="cardContent"></div>
            <div class="card-foot">
                <span>春启新章</span>
                <span>🌺 丙午 · 花印</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const nameInput = document.getElementById('name');
            const planNameInput = document.getElementById('planName');
            const planSummaryInput = document.getElementById('planSummary');
            const deadlineInput = document.getElementById('deadline');
            const submitBtn = document.getElementById('submitBtn');
            const cardOverlay = document.getElementById('cardOverlay');
            const closeCardBtn = document.getElementById('closeCardBtn');
            const cardContent = document.getElementById('cardContent');

            // 加载保存的数据
            function loadSavedData() {
                const saved = localStorage.getItem('springWish_v3');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        nameInput.value = data.name || '';
                        planNameInput.value = data.planName || '';
                        planSummaryInput.value = data.planSummary || '';
                        if (data.deadline) deadlineInput.value = data.deadline;
                    } catch (e) {}
                }
            }

            // 保存数据
            function saveFormData() {
                const data = {
                    name: nameInput.value.trim(),
                    planName: planNameInput.value.trim(),
                    planSummary: planSummaryInput.value.trim(),
                    deadline: deadlineInput.value
                };
                localStorage.setItem('springWish_v3', JSON.stringify(data));
            }

            // 设置默认日期（当前时间+7天）
            function setDefaultDate() {
                if (!deadlineInput.value) {
                    const now = new Date();
                    now.setDate(now.getDate() + 7);
                    const year = now.getFullYear();
                    const month = String(now.getMonth() + 1).padStart(2, '0');
                    const day = String(now.getDate()).padStart(2, '0');
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    deadlineInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
                }
            }

            // 防XSS
            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            // 生成心愿卡内容 (保留原有装饰性文字)
            function generateWishCard() {
                const name = nameInput.value.trim();
                const planName = planNameInput.value.trim();
                const planSummary = planSummaryInput.value.trim();
                const deadline = deadlineInput.value;

                if (!name || !planName || !planSummary || !deadline) {
                    alert('请将春意写满');
                    return false;
                }

                let dateDisplay = deadline.replace('T', ' ').substring(0, 16);
                const html = `
                    <div style="font-size:2rem; text-align:center; margin-bottom:5px;">🪷🌸</div>
                    <div style="font-size:1.6rem; font-weight:bold; text-align:center; display:block; background:rgba(252,238,224,0.7); border-radius:40px; padding:4px 12px; margin-bottom:8px;">${escapeHtml(name)}</div>
                    <div style="text-align:center; margin:8px 0; font-size:1.4rem; color:#9f6d49; border-bottom:1px dashed #dbb28b; padding-bottom:6px;">《${escapeHtml(planName)}》</div>
                    <div style="text-align:center; background:rgba(243,226,208,0.8); border-radius:30px; padding:15px; margin:12px 0; border:2px solid #e6be98; box-shadow:inset 0 0 8px #dbb08b;">${escapeHtml(planSummary)}</div>
                    <div style="display:flex; justify-content:center; gap:10px; margin:15px 0; background:#f5e4d2; border-radius:50px; padding:6px 12px; width:fit-content; margin-left:auto; margin-right:auto;">
                        <span>⏳</span><span>${escapeHtml(dateDisplay)}</span><span>🌸</span>
                    </div>
                    <div style="text-align:center; margin-top:20px; border-top:2px dotted #e4bc99; padding-top:12px; font-size:1.1rem;">
                        🌸 春启新章 · 马到功成 🐎<br>
                        <span style="opacity:0.7;">✽ 不负春光 ✿</span>
                    </div>
                `;
                cardContent.innerHTML = html;
                return true;
            }

            function showWishCard() {
                if (generateWishCard()) {
                    cardOverlay.style.display = 'flex';
                }
            }

            function closeWishCard() {
                cardOverlay.style.display = 'none';
            }

            submitBtn.addEventListener('click', function() { 
                saveFormData(); 
                showWishCard(); 
            });

            closeCardBtn.addEventListener('click', closeWishCard);
            cardOverlay.addEventListener('click', function(e) {
                if (e.target === cardOverlay) closeWishCard();
            });

            [nameInput, planNameInput, planSummaryInput].forEach(i => i.addEventListener('input', saveFormData));
            deadlineInput.addEventListener('change', saveFormData);

            loadSavedData();
            setDefaultDate();
        })();
    </script>
</body>
</html>
